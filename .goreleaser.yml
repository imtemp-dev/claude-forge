version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/forge/
    binary: forge
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/imtemp-dev/claude-forge/pkg/version.Version={{.Version}}
      - -X github.com/imtemp-dev/claude-forge/pkg/version.Commit={{.Commit}}
      - -X github.com/imtemp-dev/claude-forge/pkg/version.Date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc

brews:
  - repository:
      owner: imtemp-dev
      name: homebrew-tap
    homepage: https://github.com/imtemp-dev/claude-forge
    description: "Document-first AI development — iterate on specs, not code"
    license: MIT
    install: |
      bin.install "forge"
    test: |
      system "#{bin}/forge", "--version"

release:
  github:
    owner: imtemp-dev
    name: claude-forge
