version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/bts/
    binary: bts
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/imtemp-dev/claude-bts/pkg/version.Version={{.Version}}
      - -X github.com/imtemp-dev/claude-bts/pkg/version.Commit={{.Commit}}
      - -X github.com/imtemp-dev/claude-bts/pkg/version.Date={{.Date}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc

brews:
  - repository:
      owner: imtemp-dev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/imtemp-dev/claude-bts
    description: "Verify before you code — catches spec errors before they become debugging sessions"
    license: MIT
    install: |
      bin.install "bts"
    test: |
      system "#{bin}/bts", "--version"

release:
  github:
    owner: imtemp-dev
    name: claude-bts
